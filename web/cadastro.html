<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Css/cadastro.css">
    <link rel="icon" href="../Assets/BananaPay-logo.png" id="#logo" type="image/png">
    
    <title>BananaPay - Cadastro</title>
</head>
<body>
    <h1>Cadastro</h1>
    <div class="conteudo-2">
        <input class="input" type="email" id="email" placeholder="Email" required>
        <br>
        <input class="input" type="password"  id="senha" placeholder="Senha" required>
        <br>
        <input class="input" type="text"  id="nome" placeholder="Nome" required>
        <br>
        <input class="input" type="text" id="cpf" placeholder="CPF" required>
        <span id="erro-cpf" style="color:red; display:none;">CPF inválido</span>
        <br>
        <input class="input" type="number" id="saldo" placeholder="Deseja colocar um saldo?" required step="0.01">
        <br>
        <input class="input" type="number" id="limite" placeholder="Deseja definir um limite?" required step="0.01">
        <br> 
        
        <button id="button-cadastrar" onclick="cadastrar()">Cadastrar</button>        
    </div>
    <br>

    <p id="msg"></p>
    <p><a href="index.html" id="a-login">Já tem conta? Login</a></p>

    <script src="../js/config.js"></script>
    <script src="../js/cadastro.js"></script>

    <script>
        function validarCPF(cpf) {
            cpf = cpf.replace(/[^\d]+/g,'');
            if(cpf.length !== 11) return false;
            if (/^(\d)\1+$/.test(cpf)) return false;

            let soma = 0;
            for (let i = 0; i < 9; i++) {
                soma += parseInt(cpf.charAt(i)) * (10 - i);
            }
            let resto = (soma * 10) % 11;
            if (resto === 10 || resto === 11) resto = 0;
            if (resto !== parseInt(cpf.charAt(9))) return false;

            soma = 0;
            for (let i = 0; i < 10; i++) {
                soma += parseInt(cpf.charAt(i)) * (11 - i);
            }
            resto = (soma * 10) % 11;
            if (resto === 10 || resto === 11) resto = 0;
            if (resto !== parseInt(cpf.charAt(10))) return false;

            return true;
        }

        function handleCadastro() {
            const cpf = document.getElementById('cpf').value;
            if (!validarCPF(cpf)) {
                document.getElementById('erro-cpf').style.display = 'inline';
                return;
            }
            document.getElementById('erro-cpf').style.display = 'none';
            cadastrar(); // chama a função do cadastro.js
        }
    </script>
</body>
</html>
